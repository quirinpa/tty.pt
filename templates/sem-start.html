<body class="v f fic rel">
	<header class="_ f fic">
		$SEM_MENU
		<a class="$RB" href="/e/sem?sem_id=$sem_id">👁</a>
		$MENU
	</header>
	<h1 class="tac">$_TITLE</h1>
	<form action="/e/sem-start" method="POST" class="v f">
		<label>
			Date/Time
			<input required name="ts" type="datetime-local" value="$NOW"></input>
		</label>

		<label>
			Id
			<input required name="id"></input>
		</label>

		<label>
			Rest of the line
			<textarea name="rest" placeholder="[tel] [email] [name]"></textarea>
		</label>

		<input type="hidden" name="sem_id" value="$sem_id"></input>

		<button>Submit</button>
	</form>
</body>

$SEM_SCRIPT
